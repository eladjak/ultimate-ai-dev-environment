<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a12;
            --card: rgba(255,255,255,0.04);
            --card-hover: rgba(255,255,255,0.08);
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --green: #10b981;
            --yellow: #f59e0b;
            --red: #ef4444;
            --cyan: #06b6d4;
            --text: #fff;
            --text-dim: #64748b;
            --border: rgba(255,255,255,0.08);
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 15px;
            font-size: 14px;
        }

        /* Header - Compact */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo { font-size: 1.8em; }
        .header h1 { font-size: 1.3em; font-weight: 600; }
        .header-stats { display: flex; gap: 20px; }
        .stat { text-align: center; }
        .stat-num { font-size: 1.4em; font-weight: 700; color: var(--blue); }
        .stat-label { font-size: 0.75em; color: var(--text-dim); }
        .sync-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75em;
            color: var(--text-dim);
        }
        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }
        .sync-dot.error { background: var(--red); animation: none; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Token Usage */
        .token-bar {
            background: var(--card);
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .token-info { display: flex; align-items: center; gap: 8px; }
        .token-icon { font-size: 1.2em; }
        .token-text { font-size: 0.85em; color: var(--text-dim); }
        .token-amount { color: var(--green); font-weight: 600; }
        .token-progress {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .token-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), var(--blue));
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* Quick Actions */
        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: linear-gradient(135deg, var(--blue), var(--purple));
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(59,130,246,0.3); }
        .action-btn.secondary { background: var(--card); border: 1px solid var(--border); }

        /* Projects Grid - Compact */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        /* Project Card - Compact */
        .project {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .project:hover {
            background: var(--card-hover);
            border-color: var(--blue);
            transform: translateY(-2px);
        }
        .project.updated {
            animation: highlight 1s ease;
        }
        @keyframes highlight {
            0% { border-color: var(--green); box-shadow: 0 0 15px rgba(16,185,129,0.3); }
            100% { border-color: var(--border); box-shadow: none; }
        }
        .project-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .project-icon { font-size: 1.6em; }
        .project-title { font-weight: 600; font-size: 0.95em; flex: 1; }
        .project-id {
            font-size: 0.7em;
            color: var(--text-dim);
            background: rgba(255,255,255,0.05);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .project-desc {
            color: var(--text-dim);
            font-size: 0.8em;
            line-height: 1.4;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .project-meta {
            font-size: 0.7em;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .project-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .project-category {
            font-size: 0.7em;
            padding: 3px 8px;
            border-radius: 10px;
        }
        .cat-business { background: rgba(16,185,129,0.15); color: var(--green); }
        .cat-development { background: rgba(59,130,246,0.15); color: var(--blue); }
        .cat-finance { background: rgba(245,158,11,0.15); color: var(--yellow); }
        .cat-edutech { background: rgba(139,92,246,0.15); color: var(--purple); }
        .cat-content { background: rgba(239,68,68,0.15); color: var(--red); }
        .cat-web { background: rgba(6,182,212,0.15); color: var(--cyan); }

        .launch-btn {
            background: linear-gradient(135deg, var(--blue), var(--purple));
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 600;
            transition: all 0.2s;
        }
        .launch-btn:hover { transform: scale(1.05); }

        /* Status indicator */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            position: absolute;
            top: 14px;
            left: 14px;
        }
        .status-in_progress, .status-active { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .status-planning { background: var(--yellow); }
        .status-not_started, .status-pending { background: var(--text-dim); }
        .status-completed { background: var(--blue); }
        .status-paused { background: var(--red); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--green);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s;
        }
        .toast.show { display: block; }
        .toast.error { background: var(--red); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Command modal */
        .cmd-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .cmd-modal.show { display: flex; }
        .cmd-content {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 25px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--border);
        }
        .cmd-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        .cmd-icon { font-size: 2em; }
        .cmd-title { font-size: 1.2em; font-weight: 600; }
        .cmd-box {
            background: #0f0f1a;
            border-radius: 10px;
            padding: 15px;
            font-family: 'Consolas', monospace;
            font-size: 0.95em;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            user-select: all;
            cursor: text;
            white-space: pre-wrap;
        }
        .cmd-hint {
            color: var(--text-dim);
            font-size: 0.85em;
            margin-bottom: 15px;
        }
        .cmd-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .cmd-btn {
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
        }
        .cmd-btn.primary { background: var(--green); color: white; }
        .cmd-btn.secondary { background: var(--card); color: white; border: 1px solid var(--border); }
        .cmd-btn:hover { transform: translateY(-2px); }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 10px; text-align: center; }
            .header-stats { justify-content: center; }
            .projects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <span class="logo">🤖</span>
            <h1>Claude Projects</h1>
            <div class="sync-indicator">
                <span class="sync-dot" id="syncDot"></span>
                <span id="syncStatus">מסנכרן...</span>
            </div>
        </div>
        <div class="header-stats" id="headerStats">
            <div class="stat">
                <div class="stat-num" id="totalProjects">-</div>
                <div class="stat-label">פרויקטים</div>
            </div>
            <div class="stat">
                <div class="stat-num" style="color: var(--green)" id="activeProjects">-</div>
                <div class="stat-label">פעילים</div>
            </div>
            <div class="stat">
                <div class="stat-num" style="color: var(--yellow)" id="planningProjects">-</div>
                <div class="stat-label">בתכנון</div>
            </div>
            <div class="stat">
                <div class="stat-num" style="color: var(--purple)" id="completedProjects">-</div>
                <div class="stat-label">הושלמו</div>
            </div>
        </div>
    </div>

    <!-- Token Usage -->
    <div class="token-bar">
        <div class="token-info">
            <span class="token-icon">💎</span>
            <span class="token-text">מנוי Max $200 | נוצל: <span class="token-amount" id="tokenUsed">טוען...</span></span>
        </div>
        <div class="token-progress">
            <div class="token-fill" id="tokenFill" style="width: 0%"></div>
        </div>
        <span class="token-text" id="tokenPercent">-</span>
    </div>

    <!-- Quick Actions -->
    <div class="actions">
        <button class="action-btn" onclick="launchAll()">🚀 הפעל הכל</button>
        <button class="action-btn secondary" onclick="copyLaunchAll()">📋 העתק פקודה</button>
        <button class="action-btn secondary" onclick="refreshData()">🔄 רענן עכשיו</button>
        <button class="action-btn secondary" onclick="openRegistry()">📝 ערוך רג׳יסטרי</button>
    </div>

    <!-- Projects Grid -->
    <div class="projects-grid" id="projectsGrid">
        <div class="loading">🔄 טוען פרויקטים...</div>
    </div>

    <!-- Command Modal -->
    <div class="cmd-modal" id="cmdModal">
        <div class="cmd-content">
            <div class="cmd-header">
                <span class="cmd-icon" id="cmdIcon">🚀</span>
                <span class="cmd-title" id="cmdTitle">הפעל פרויקט</span>
            </div>
            <div class="cmd-box" id="cmdBox" onclick="copyCommand()"></div>
            <div class="cmd-hint">
                💡 <strong>הפעל טרמינל Git Bash</strong> והדבק את הפקודה (Ctrl+Shift+Insert)
            </div>
            <div class="cmd-actions">
                <button class="cmd-btn secondary" onclick="closeModal()">סגור</button>
                <button class="cmd-btn primary" onclick="copyCommand()">📋 העתק</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // Configuration - auto-detect if running via server or file://
        const isLocalServer = window.location.protocol === 'http:' || window.location.protocol === 'https:';
        const CONFIG = {
            registryPath: isLocalServer ? '/projects-registry.json' : 'file:///C:/Users/eladj/.claude/projects-registry.json',
            tokenPath: isLocalServer ? '/token-usage.json' : 'file:///C:/Users/eladj/.claude/token-usage.json',
            refreshInterval: 5000, // 5 seconds
            maxBudget: 200
        };

        let projects = [];
        let categories = {};
        let lastDataHash = '';
        let currentCmd = '';

        // Category display names
        const categoryNames = {
            business: 'עסקים',
            development: 'פיתוח',
            finance: 'פיננסים',
            edutech: 'EdTech',
            content: 'תוכן',
            web: 'אתרים'
        };

        // Hash function for change detection
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash.toString();
        }

        // Fetch projects from registry
        async function fetchProjects() {
            try {
                // For file:// protocol, we need to use XMLHttpRequest
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('GET', CONFIG.registryPath, true);
                    xhr.onload = function() {
                        if (xhr.status === 200 || xhr.status === 0) { // status 0 for file://
                            try {
                                const data = JSON.parse(xhr.responseText);
                                resolve(data);
                            } catch (e) {
                                reject(e);
                            }
                        } else {
                            reject(new Error('Failed to load'));
                        }
                    };
                    xhr.onerror = reject;
                    xhr.send();
                });
            } catch (error) {
                console.error('Failed to fetch projects:', error);
                throw error;
            }
        }

        // Fetch token usage
        async function fetchTokenUsage() {
            try {
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('GET', CONFIG.tokenPath, true);
                    xhr.onload = function() {
                        if (xhr.status === 200 || xhr.status === 0) {
                            try {
                                resolve(JSON.parse(xhr.responseText));
                            } catch (e) {
                                resolve({ used: 0, limit: CONFIG.maxBudget });
                            }
                        } else {
                            resolve({ used: 0, limit: CONFIG.maxBudget });
                        }
                    };
                    xhr.onerror = () => resolve({ used: 0, limit: CONFIG.maxBudget });
                    xhr.send();
                });
            } catch (error) {
                return { used: 0, limit: CONFIG.maxBudget };
            }
        }

        // Update statistics
        function updateStats() {
            const total = projects.length;
            const active = projects.filter(p => p.status === 'in_progress' || p.status === 'active').length;
            const planning = projects.filter(p => p.status === 'planning').length;
            const completed = projects.filter(p => p.status === 'completed').length;

            document.getElementById('totalProjects').textContent = total;
            document.getElementById('activeProjects').textContent = active;
            document.getElementById('planningProjects').textContent = planning;
            document.getElementById('completedProjects').textContent = completed;
        }

        // Update token display
        function updateTokenDisplay(tokenData) {
            const used = tokenData.used || 0;
            const limit = tokenData.limit || CONFIG.maxBudget;
            const percent = Math.round((used / limit) * 100);

            document.getElementById('tokenUsed').textContent = `~$${used}`;
            document.getElementById('tokenPercent').textContent = `${percent}%`;
            document.getElementById('tokenFill').style.width = `${percent}%`;

            // Change color based on usage
            const fill = document.getElementById('tokenFill');
            if (percent >= 80) {
                fill.style.background = 'linear-gradient(90deg, var(--yellow), var(--red))';
            } else if (percent >= 50) {
                fill.style.background = 'linear-gradient(90deg, var(--green), var(--yellow))';
            } else {
                fill.style.background = 'linear-gradient(90deg, var(--green), var(--blue))';
            }
        }

        // Render projects grid
        function renderProjects(changedIds = []) {
            const grid = document.getElementById('projectsGrid');

            if (projects.length === 0) {
                grid.innerHTML = '<div class="loading">אין פרויקטים ברג׳יסטרי</div>';
                return;
            }

            grid.innerHTML = projects.map(p => {
                const catName = categoryNames[p.category] || p.category;
                const isUpdated = changedIds.includes(p.id);
                const lastSession = p.lastSession ? `עודכן: ${p.lastSession}` : '';

                return `
                <div class="project ${isUpdated ? 'updated' : ''}" onclick="showLaunch(${p.id})">
                    <div class="status-dot status-${p.status}"></div>
                    <div class="project-header">
                        <span class="project-icon">${p.icon}</span>
                        <span class="project-title">${p.name}</span>
                        <span class="project-id">#${p.id}</span>
                    </div>
                    <div class="project-desc">${p.description}</div>
                    ${lastSession ? `<div class="project-meta">📅 ${lastSession}</div>` : ''}
                    <div class="project-footer">
                        <span class="project-category cat-${p.category}">${catName}</span>
                        <button class="launch-btn" onclick="event.stopPropagation(); showLaunch(${p.id})">🚀 הפעל</button>
                    </div>
                </div>
            `}).join('');
        }

        // Refresh data
        async function refreshData() {
            try {
                const [registryData, tokenData] = await Promise.all([
                    fetchProjects(),
                    fetchTokenUsage()
                ]);

                const newHash = simpleHash(JSON.stringify(registryData.projects));
                const hasChanged = newHash !== lastDataHash;

                // Find changed projects
                let changedIds = [];
                if (hasChanged && projects.length > 0) {
                    const oldProjectsMap = new Map(projects.map(p => [p.id, JSON.stringify(p)]));
                    changedIds = registryData.projects
                        .filter(p => oldProjectsMap.get(p.id) !== JSON.stringify(p))
                        .map(p => p.id);
                }

                projects = registryData.projects || [];
                categories = registryData.categories || {};
                lastDataHash = newHash;

                updateStats();
                updateTokenDisplay(tokenData);
                renderProjects(changedIds);

                // Update sync status
                document.getElementById('syncDot').classList.remove('error');
                document.getElementById('syncStatus').textContent = `סונכרן: ${new Date().toLocaleTimeString('he-IL')}`;

                if (hasChanged && changedIds.length > 0) {
                    showToast(`🔄 ${changedIds.length} פרויקטים עודכנו`);
                }

            } catch (error) {
                console.error('Refresh failed:', error);
                document.getElementById('syncDot').classList.add('error');
                document.getElementById('syncStatus').textContent = 'שגיאת סנכרון';
            }
        }

        // Show launch modal
        function showLaunch(id) {
            const p = projects.find(x => x.id === id);
            if (!p) return;

            // Use the project's folder path
            const folder = p.folder.replace(/\\/g, '/').replace('C:', '/c');
            currentCmd = `cd "${folder}" && claude "${p.prompt || 'קרא את CLAUDE.md והמשך מהנקודה שעצרנו'}"`;

            document.getElementById('cmdIcon').textContent = p.icon;
            document.getElementById('cmdTitle').textContent = `הפעל: ${p.name}`;
            document.getElementById('cmdBox').textContent = currentCmd;
            document.getElementById('cmdModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('cmdModal').classList.remove('show');
        }

        function copyCommand() {
            navigator.clipboard.writeText(currentCmd).then(() => {
                showToast('📋 הפקודה הועתקה! הדבק בטרמינל');
            });
        }

        function launchAll() {
            currentCmd = 'bash ~/.claude/scripts/startup-claude.sh';
            document.getElementById('cmdIcon').textContent = '🚀';
            document.getElementById('cmdTitle').textContent = 'הפעל את כל הפרויקטים';
            document.getElementById('cmdBox').textContent = currentCmd + '\n\nבחר "a" בתפריט להפעלת הכל';
            document.getElementById('cmdModal').classList.add('show');
        }

        function copyLaunchAll() {
            navigator.clipboard.writeText('bash ~/.claude/scripts/startup-claude.sh').then(() => {
                showToast('📋 הועתק!');
            });
        }

        function openRegistry() {
            currentCmd = 'code ~/.claude/projects-registry.json';
            document.getElementById('cmdIcon').textContent = '📝';
            document.getElementById('cmdTitle').textContent = 'ערוך רג׳יסטרי';
            document.getElementById('cmdBox').textContent = currentCmd;
            document.getElementById('cmdModal').classList.add('show');
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Close modal on outside click or Escape
        document.getElementById('cmdModal').addEventListener('click', e => {
            if (e.target.classList.contains('cmd-modal')) closeModal();
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
        });

        // Initial load
        refreshData();

        // Auto-refresh every 5 seconds
        setInterval(refreshData, CONFIG.refreshInterval);

        // Also refresh on visibility change (when user returns to tab)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                refreshData();
            }
        });
    </script>
</body>
</html>
